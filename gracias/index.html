<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recibido — SubeSeguro</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../tokens.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <style>
    .center{min-height:80vh;display:grid;place-items:center;padding:24px;}
    .box{max-width:440px;text-align:center;}
    .ok{width:64px;height:64px;border-radius:999px;background:var(--sage-soft);color:var(--sage);
        display:grid;place-items:center;font-size:1.6rem;margin:0 auto 20px;}
    .btn{display:inline-flex;align-items:center;gap:8px;border-radius:var(--r-btn);padding:11px 20px;
         font-size:.95rem;text-decoration:none;background:var(--coral);color:#fff;margin-top:24px;}
  </style>
</head>
<body>
  <div class="center">
    <div class="ds-card box">
      <div class="ok"><i class="fa-solid fa-check"></i></div>
      <h1 class="ds-h2">Recibimos tu app</h1>
      <p class="ds-muted">En menos de 48 horas te llega el informe con los 3 hallazgos más importantes
         al correo que nos dejaste. Revisa también la carpeta de spam, por si acaso.</p>
      <a class="btn" href="../">Volver</a>
    </div>
  </div>
</body>
</html>
